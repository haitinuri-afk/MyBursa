<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bursa — בורסת תל אביב</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f1013">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bursa">
    <link rel="apple-touch-icon" href="/icon-192.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="style.css?v=6">
</head>
<body class="bg-white text-gray-900">
    <div class="main-wrapper">
        <!-- Header Bar -->
        <header class="top-bar">
            <!-- Logo -->
            <div class="hdr-logo">
                <span class="hdr-logo-mark">B</span>
                <span class="hdr-logo-text">בורסת תל אביב</span>
                <span id="market-status-pill" class="hdr-status-pill">
                    <span id="market-status" class="hdr-dot">●</span>
                    <span id="market-label" class="hdr-label"></span>
                </span>
                <span id="data-status" class="hdr-badge">SIM</span>
            </div>

            <!-- Center: clock + delay -->
            <div class="hdr-center">
                <span class="hdr-delay">נתונים מעוכבים ~15 דק׳</span>
                <span class="hdr-sep">|</span>
                <span id="last-update" class="hdr-time"></span>
            </div>

            <!-- Actions -->
            <div class="hdr-actions" dir="ltr">
                <button onclick="toggleReportPanel()" class="hdr-btn" id="report-toggle-btn">📋 דוח</button>
                <button onclick="resetWindows()" class="hdr-btn">&#8635; Reset</button>
            </div>
        </header>

        <!-- Ticker -->
        <div class="ticker-row">
            <div class="flex-grow overflow-hidden h-full flex items-center" style="direction:ltr">
                <div id="ticker-content" class="ticker-scroll"></div>
            </div>
        </div>

        <!-- Scan Strip -->
        <div id="scan-strip" class="scan-strip" style="display:none">
            <span class="scan-strip-label">🔍 דוחות:</span>
            <div id="scan-strip-items" class="scan-strip-items"></div>
        </div>

        <!-- Mobile Tab Bar -->
        <nav id="mobile-tabs" class="mobile-tab-bar">
            <button class="mob-tab active" data-tab="market" onclick="switchMobileTab('market')">
                <span class="mob-tab-icon">📊</span>
                <span class="mob-tab-label">שוק</span>
            </button>
            <button class="mob-tab" data-tab="portfolio" onclick="switchMobileTab('portfolio')">
                <span class="mob-tab-icon">💼</span>
                <span class="mob-tab-label">תיק</span>
            </button>
            <button class="mob-tab" data-tab="ai" onclick="switchMobileTab('ai')">
                <span class="mob-tab-icon">🤖</span>
                <span class="mob-tab-label">AI</span>
            </button>
            <button class="mob-tab" data-tab="report" onclick="switchMobileTab('report')">
                <span class="mob-tab-icon">📋</span>
                <span class="mob-tab-label">דוח</span>
            </button>
        </nav>

        <!-- Dashboard Area -->
        <div id="dashboard" class="dashboard-grid">

            <!-- TA-35 Index Window -->
            <div id="win-indices-tase" class="card">
                <div class="window-header">
                    <div style="display:flex;align-items:center;gap:6px">
                        <h3>TA-35 Index</h3>
                        <span id="ta35-status" style="font-size:9px;font-family:monospace;font-weight:700;color:#ea4335"></span>
                    </div>
                    <div class="window-controls">
                        <div class="timeframe-buttons" id="index-tf-btns">
                            <button class="active" onclick="updateTimeframe('daily')">D</button>
                            <button onclick="updateTimeframe('weekly')">W</button>
                            <button onclick="updateTimeframe('monthly')">M</button>
                            <button onclick="updateTimeframe('3months')">3M</button>
                        </div>
                        <button class="win-btn win-max" onclick="toggleMaximize('win-indices-tase')"></button>
                        <button class="win-btn win-close" onclick="this.closest('.card').style.display='none'"></button>
                    </div>
                </div>
                <div class="card-body" dir="ltr" style="padding:10px 12px 8px">
                    <div style="margin-bottom:6px">
                        <div style="font-size:1.7rem;font-weight:700;font-family:'Inter',sans-serif;color:#202124;letter-spacing:-1px;line-height:1;font-variant-numeric:tabular-nums" id="ta35-price"></div>
                        <div style="display:flex;align-items:center;gap:6px;margin-top:5px">
                            <span id="ta35-pct" style="font-family:'Inter',sans-serif;font-weight:600;font-size:0.82rem"></span>
                            <span id="ta35-pts" style="font-family:'Inter',sans-serif;font-size:0.78rem;color:#9aa0a6"></span>
                        </div>
                    </div>
                    <div style="flex:1;position:relative;min-height:0">
                        <div id="indexChart" style="position:absolute;inset:0"></div>
                    </div>
                </div>
            </div>

            <!-- Leading Stocks Window -->
            <div id="win-stocks" class="card">
                <div class="window-header">
                    <h3>מניות מובילות</h3>
                    <div class="window-controls">
                        <button class="win-btn win-max" onclick="toggleMaximize('win-stocks')"></button>
                        <button class="win-btn win-close" onclick="this.closest('.card').style.display='none'"></button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="scroll-container">
                        <table id="stock-table">
                            <thead>
                                <tr>
                                    <th class="text-right">מניה</th>
                                    <th class="text-right">מחיר</th>
                                    <th class="pct-col text-center">שינוי%</th>
                                    <th class="text-center" style="width:28px"></th>
                                </tr>
                            </thead>
                            <tbody id="stock-list"></tbody>
                        </table>
                    </div>
                    <button id="stock-show-more-btn" onclick="_stockShowAll=!_stockShowAll;updateStockList()" style="display:none;margin-top:4px;font-size:10px;padding:4px 0;width:100%;background:#f1f3f4;border:1px solid rgba(0,0,0,0.12);border-radius:8px;color:#1a73e8;font-weight:600;cursor:pointer"></button>
                    <button id="refresh-btn" style="margin-top:4px;font-size:10px;padding:4px 0;width:100%;background:#f1f3f4;border:1px solid rgba(0,0,0,0.12);border-radius:8px;color:#3c4043;cursor:pointer">רענן</button>
                </div>
            </div>

            <!-- Main Chart Window -->
            <div id="win-main-chart" class="card">
                <div class="window-header" dir="ltr">
                    <div style="display:flex;align-items:center;gap:8px">
                        <bdi style="font-size:0.8rem;color:#202124;font-weight:600;font-family:inherit" id="main-chart-title">לאומי</bdi>
                        <span id="main-chart-price" style="font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:#202124;font-variant-numeric:tabular-nums"></span>
                        <span id="main-chart-pct"   style="font-family:'Inter',sans-serif;font-size:11px;font-weight:500;font-variant-numeric:tabular-nums"></span>
                        <span id="main-chart-date"  style="font-family:'Inter',sans-serif;font-size:10px;color:#9aa0a6;font-variant-numeric:tabular-nums"></span>
                    </div>
                    <div class="window-controls">
                        <div class="timeframe-buttons" id="main-tf-btns">
                            <button onclick="updateMainTimeframe('intraday')">I</button>
                            <button class="active" onclick="updateMainTimeframe('daily')">D</button>
                            <button onclick="updateMainTimeframe('weekly')">W</button>
                            <button onclick="updateMainTimeframe('monthly')">M</button>
                            <button onclick="updateMainTimeframe('3months')">3M</button>
                        </div>
                        <button class="win-btn win-max" onclick="toggleMaximize('win-main-chart')"></button>
                        <button class="win-btn win-close" onclick="this.closest('.card').style.display='none'"></button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="flex-1 w-full overflow-hidden relative" style="min-height:0;position:relative;background:#ffffff;border-radius:8px">
                        <div id="stockChart" style="position:absolute;inset:0"></div>
                    </div>
                </div>
            </div>

            <!-- Portfolio Window -->
            <div id="win-portfolio" class="card">
                <div class="window-header">
                    <h3>תיק השקעות</h3>
                    <div class="window-controls">
                        <button onclick="togglePortfolioChart()" style="font-size:10px;background:#e8f0fe;border:1px solid #c5d3f5;color:#1a73e8;padding:2px 10px;border-radius:20px;height:20px;line-height:1;cursor:pointer;font-weight:600">📈 גרף</button>
                        <button class="win-btn win-max" onclick="toggleMaximize('win-portfolio')"></button>
                        <button class="win-btn win-close" onclick="this.closest('.card').style.display='none'"></button>
                    </div>
                </div>
                <div class="card-body" dir="ltr">
                    <div class="scroll-container">
                        <table id="portfolio-table">
                            <thead>
                                <tr>
                                    <th class="whitespace-nowrap text-left">מניה</th>
                                    <th class="pct-col text-center">P/L%</th>
                                    <th class="text-right" style="font-size:9px">P/L ₪</th>
                                    <th class="pct-col text-center">יום%</th>
                                    <th class="text-right">שווי</th>
                                    <th class="text-center">פעולה</th>
                                </tr>
                            </thead>
                            <tbody id="portfolio-list"></tbody>
                        </table>
                    </div>
                    <div class="portfolio-footer">
                        <span>סה"כ</span>
                        <span id="total-portfolio-value">₪0.00</span>
                    </div>
                </div>
            </div>

            <!-- Simulator Window -->
            <div id="win-simulator" class="card">
                <div class="window-header">
                    <h3>סימולטור</h3>
                    <div class="window-controls">
                        <button class="win-btn win-max" onclick="toggleMaximize('win-simulator')"></button>
                        <button class="win-btn win-close" onclick="this.closest('.card').style.display='none'"></button>
                    </div>
                </div>
                <div class="card-body" dir="ltr">
                    <div style="display:flex;gap:6px;margin-bottom:6px">
                        <div style="position:relative;flex:1">
                            <input type="text" id="sim-symbol" placeholder="חפש מניה בעברית..." dir="rtl"
                                style="background:#f1f3f4;border:1px solid rgba(0,0,0,0.15);color:#202124;padding:5px 8px;border-radius:8px;font-size:12px;width:100%;outline:none"
                                oninput="stockAutocomplete(this.value)"
                                onkeydown="handleAutocompleteKey(event)"
                                onblur="setTimeout(()=>document.getElementById('ac-dropdown').style.display='none',150)"
                                onfocus="stockAutocomplete(this.value)">
                            <div id="ac-dropdown" style="display:none;position:absolute;top:100%;right:0;left:0;z-index:9999;background:#fff;border:1px solid rgba(0,0,0,0.15);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.12);max-height:160px;overflow-y:auto;margin-top:2px"></div>
                        </div>
                        <input type="number" id="sim-qty" placeholder="כמות" min="1" style="background:#f1f3f4;border:1px solid rgba(0,0,0,0.15);color:#202124;padding:5px 8px;border-radius:8px;font-size:12px;width:72px;outline:none" onkeydown="if(event.key==='Enter') buyStock()">
                    </div>
                    <div style="display:flex;gap:6px;margin-bottom:8px">
                        <button id="buy-btn" style="flex:1;background:#34a853;color:#fff;padding:6px 0;border-radius:20px;font-weight:700;font-size:12px;border:none;cursor:pointer">קנה</button>
                        <button id="sell-btn-sim" style="flex:1;background:#ea4335;color:#fff;padding:6px 0;border-radius:20px;font-weight:700;font-size:12px;border:none;cursor:pointer">מכור</button>
                    </div>
                    <div style="font-size:9px;color:#5f6368;margin-bottom:4px;font-weight:600">היסטוריית עסקאות</div>
                    <div class="scroll-container" style="max-height:120px">
                        <table style="width:100%;border-collapse:collapse;font-size:9px">
                            <thead>
                                <tr style="color:#5f6368">
                                    <th style="text-align:left;padding:1px 3px">שעה</th>
                                    <th style="text-align:left;padding:1px 3px">פעולה</th>
                                    <th style="text-align:left;padding:1px 3px">סימול</th>
                                    <th style="text-align:right;padding:1px 3px">כמות</th>
                                    <th style="text-align:right;padding:1px 3px">מחיר</th>
                                </tr>
                            </thead>
                            <tbody id="tx-history-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>


            <!-- Portfolio Chart Window -->
            <div id="win-portfolio-chart" class="card" style="display:none">
                <div class="window-header">
                    <h3>📈 ביצועי תיק</h3>
                    <div class="window-controls">
                        <div class="timeframe-buttons">
                            <button id="ptf-day"  class="active" onclick="setPortfolioTf('day')">יום</button>
                            <button id="ptf-week" onclick="setPortfolioTf('week')">שבוע</button>
                            <button id="ptf-all"  onclick="setPortfolioTf('all')">הכל</button>
                        </div>
                        <button class="win-btn win-max" onclick="toggleMaximize('win-portfolio-chart')"></button>
                        <button class="win-btn win-close" onclick="this.closest('.card').style.display='none'"></button>
                    </div>
                </div>
                <div class="card-body" style="display:flex;flex-direction:column;gap:4px">
                    <div id="portfolio-chart-summary" style="text-align:center;padding:2px 0"></div>
                    <div id="ptf-chart-wrap" style="flex:1;min-height:0;position:relative;overflow:hidden;background:#fff;border-radius:8px">
                        <div id="portfolioChart" style="position:absolute;top:0;left:0;right:0;bottom:24px"></div>
                        <div id="portfolio-chart-timerange" style="position:absolute;bottom:0;left:0;right:0;height:24px;display:none;align-items:center;justify-content:space-between;padding:0 56px 0 22px;font-size:11px;color:#9aa0a6;font-family:Inter,sans-serif;direction:ltr;border-top:1px solid rgba(0,0,0,0.07)"></div>
                    </div>
                </div>
            </div>

            <!-- Search Window -->
            <div id="win-search" class="card">
                <div class="window-header" style="padding:6px 12px">
                    <div style="display:flex;gap:8px;flex:1;align-items:center" dir="ltr">
                        <span style="font-size:13px">🔍</span>
                        <input type="text" id="search-symbol" placeholder="חפש מניה (e.g. לאומי / LUMI.TA)"
                            style="background:#f1f3f4;border:1px solid rgba(0,0,0,0.15);color:#202124;padding:4px 12px;border-radius:20px;font-size:12px;flex:1;outline:none;height:26px"
                            onkeydown="if(event.key==='Enter') searchSymbol()">
                        <button onclick="searchSymbol()" style="background:#1a73e8;color:#fff;padding:0 16px;border-radius:20px;font-size:12px;font-weight:600;border:none;cursor:pointer;height:26px">חפש</button>
                        <span id="search-error" style="font-size:10px;color:#ea4335;white-space:nowrap" class="hidden">לא נמצא</span>
                    </div>
                </div>
            </div>

            <!-- AI Chat Window -->
            <div id="win-ai-chat" class="card" style="display:flex;flex-direction:column">
                <div class="window-header">
                    <h3>🤖 יועץ AI</h3>
                    <div class="window-controls">
                        <button onclick="clearAIChat()" style="font-size:9px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#9aa0a6;padding:0 8px;border-radius:20px;height:18px;line-height:1;cursor:pointer">נקה</button>
                        <button class="win-btn win-max" onclick="toggleMaximize('win-ai-chat')"></button>
                        <button class="win-btn win-close" onclick="this.closest('.card').style.display='none'"></button>
                    </div>
                </div>
                <div id="ai-messages" class="chat-messages"></div>
                <div class="chat-input-row">
                    <input id="ai-input" class="chat-input" type="text" placeholder="שאל על התיק שלך..." dir="rtl"
                        onkeydown="if(event.key==='Enter') sendAIMessage()" />
                    <button onclick="sendAIMessage()" id="ai-send-btn" class="chat-send-btn">שלח</button>
                </div>
            </div>

            <!-- Report Analyzer Card -->
            <div id="win-report" class="card">
                <div class="window-header">
                    <h3>📋 ניתוח דוח כספי</h3>
                    <div class="window-controls">
                        <button onclick="clearReport()" style="font-size:9px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#9aa0a6;padding:0 8px;border-radius:20px;height:18px;line-height:1;cursor:pointer">נקה</button>
                        <button class="win-btn win-max" onclick="toggleMaximize('win-report')"></button>
                        <button class="win-btn win-close" onclick="this.closest('.card').style.display='none'"></button>
                    </div>
                </div>

                <!-- Input area -->
                <div id="report-input-area" style="padding:12px;display:flex;flex-direction:column;gap:8px">

                    <!-- PDF upload zone -->
                    <label id="report-pdf-zone" style="display:flex;align-items:center;justify-content:center;gap:8px;border:2px dashed var(--border);border-radius:10px;padding:14px;cursor:pointer;color:var(--text2);font-size:0.82rem;transition:border-color .15s;background:var(--bg)" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='var(--border)'">
                        <span style="font-size:1.4rem">📄</span>
                        <span>גרור PDF לכאן או <strong style="color:var(--primary)">לחץ לבחירה</strong></span>
                        <input type="file" accept="application/pdf" style="display:none" onchange="analyzeReportPDF(this)">
                    </label>

                    <div style="text-align:center;font-size:0.75rem;color:var(--text2)">— או הדבק טקסט —</div>

                    <textarea id="report-text" placeholder="הדבק כאן טקסט של דוח כספי..." dir="rtl"
                        style="width:100%;min-height:80px;max-height:160px;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:0.85rem;background:var(--bg);color:var(--text);resize:vertical;font-family:inherit;line-height:1.5;outline:none"></textarea>
                    <button onclick="analyzeReport()" id="report-analyze-btn"
                        style="align-self:flex-end;padding:8px 20px;background:var(--primary);color:#fff;border:none;border-radius:20px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:opacity .15s">
                        🔍 נתח טקסט
                    </button>
                </div>

                <!-- Results area -->
                <div id="report-result" style="flex:1;overflow-y:auto;padding:0 12px 12px"></div>
            </div>

        </div>
    </div>

    <script src="script.js?v=18"></script>
    <script>
      if ('serviceWorker' in navigator) {
        // Unregister old service workers, then re-register fresh
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(r => r.unregister());
        });
        navigator.serviceWorker.register('/sw.js');
      }
    </script>
</body>
</html>
