<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bursa — בורסת תל אביב</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f1013">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bursa">
    <link rel="apple-touch-icon" href="/icon-192.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white text-gray-900">
    <div class="main-wrapper">
        <!-- Header Bar -->
        <header class="top-bar px-2" style="justify-content:space-between">
            <h1 style="font-size:0.75rem;font-weight:700;color:#202124;display:flex;align-items:center;gap:6px">
                בורסת תל אביב
                <span id="market-status" style="font-size:8px">●</span>
                <span id="market-label" style="font-size:8px;font-family:monospace;font-weight:700"></span>
                <span id="data-status" style="font-size:8px;font-family:monospace;padding:1px 5px;border-radius:4px;background:#f1f3f4;color:#5f6368">SIM</span>
            </h1>
            <div style="display:flex;align-items:center;gap:10px" dir="ltr">
                <button onclick="resetWindows()" style="font-size:10px;background:#f1f3f4;border:1px solid rgba(0,0,0,0.12);color:#5f6368;padding:2px 10px;border-radius:20px;cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:600">↺ Reset</button>
                <span style="font-size:11px;font-family:'Inter',sans-serif;color:#9aa0a6;letter-spacing:0.01em">נתונים מעוכבים ~15 דק׳</span>
                <span id="last-update" style="font-size:11px;font-family:'Inter',sans-serif;color:#5f6368;font-weight:500"></span>
            </div>
        </header>

        <!-- Ticker -->
        <div class="ticker-row">
            <div class="flex-grow overflow-hidden h-full flex items-center">
                <div id="ticker-content" class="ticker-scroll"></div>
            </div>
        </div>

        <!-- Dashboard Area -->
        <div id="dashboard" class="dashboard-grid">

            <!-- TA-35 Index Window -->
            <div id="win-indices-tase" class="card">
                <div class="window-header">
                    <div style="display:flex;align-items:center;gap:6px">
                        <h3>TA-35 Index</h3>
                        <span id="ta35-status" style="font-size:9px;font-family:monospace;font-weight:700;color:#ea4335"></span>
                    </div>
                    <div class="window-controls">
                        <div class="timeframe-buttons" id="index-tf-btns">
                            <button class="active" onclick="updateTimeframe('daily')">D</button>
                            <button onclick="updateTimeframe('weekly')">W</button>
                            <button onclick="updateTimeframe('monthly')">M</button>
                            <button onclick="updateTimeframe('3months')">3M</button>
                        </div>
                        <button class="win-btn win-max" onclick="toggleMaximize('win-indices-tase')"></button>
                        <button class="win-btn win-close" onclick="this.closest('.card').style.display='none'"></button>
                    </div>
                </div>
                <div class="card-body" dir="ltr" style="padding:10px 12px 8px">
                    <div style="margin-bottom:6px">
                        <div style="font-size:1.7rem;font-weight:700;font-family:'Inter',sans-serif;color:#202124;letter-spacing:-1px;line-height:1;font-variant-numeric:tabular-nums" id="ta35-price"></div>
                        <div style="display:flex;align-items:center;gap:6px;margin-top:5px">
                            <span id="ta35-pct" style="font-family:'Inter',sans-serif;font-weight:600;font-size:0.82rem"></span>
                            <span id="ta35-pts" style="font-family:'Inter',sans-serif;font-size:0.78rem;color:#9aa0a6"></span>
                        </div>
                    </div>
                    <div style="flex:1;position:relative;min-height:0">
                        <div id="indexChart" style="position:absolute;inset:0"></div>
                    </div>
                </div>
            </div>

            <!-- Leading Stocks Window -->
            <div id="win-stocks" class="card">
                <div class="window-header">
                    <h3>מניות מובילות</h3>
                    <div class="window-controls">
                        <button class="win-btn win-max" onclick="toggleMaximize('win-stocks')"></button>
                        <button class="win-btn win-close" onclick="this.closest('.card').style.display='none'"></button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="scroll-container">
                        <table id="stock-table">
                            <thead>
                                <tr>
                                    <th class="text-right">מניה</th>
                                    <th class="text-right">מחיר</th>
                                    <th class="pct-col text-center">שינוי%</th>
                                    <th class="text-center" style="width:28px"></th>
                                </tr>
                            </thead>
                            <tbody id="stock-list"></tbody>
                        </table>
                    </div>
                    <button id="refresh-btn" style="margin-top:4px;font-size:10px;padding:4px 0;width:100%;background:#f1f3f4;border:1px solid rgba(0,0,0,0.12);border-radius:8px;color:#3c4043;cursor:pointer">רענן</button>
                </div>
            </div>

            <!-- Main Chart Window -->
            <div id="win-main-chart" class="card">
                <div class="window-header" dir="ltr">
                    <div style="display:flex;align-items:center;gap:8px">
                        <bdi style="font-size:0.8rem;color:#202124;font-weight:600;font-family:inherit" id="main-chart-title">לאומי</bdi>
                        <span id="main-chart-price" style="font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:#202124;font-variant-numeric:tabular-nums"></span>
                        <span id="main-chart-pct"   style="font-family:'Inter',sans-serif;font-size:11px;font-weight:500;font-variant-numeric:tabular-nums"></span>
                    </div>
                    <div class="window-controls">
                        <div class="timeframe-buttons" id="main-tf-btns">
                            <button class="active" onclick="updateMainTimeframe('daily')">D</button>
                            <button onclick="updateMainTimeframe('weekly')">W</button>
                            <button onclick="updateMainTimeframe('monthly')">M</button>
                            <button onclick="updateMainTimeframe('3months')">3M</button>
                        </div>
                        <button class="win-btn win-max" onclick="toggleMaximize('win-main-chart')"></button>
                        <button class="win-btn win-close" onclick="this.closest('.card').style.display='none'"></button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="flex-1 w-full overflow-hidden relative" style="min-height:0;position:relative;background:#ffffff;border-radius:8px">
                        <div id="stockChart" style="position:absolute;inset:0"></div>
                    </div>
                </div>
            </div>

            <!-- Portfolio Window -->
            <div id="win-portfolio" class="card">
                <div class="window-header">
                    <h3>תיק השקעות</h3>
                    <div class="window-controls">
                        <button onclick="togglePortfolioChart()" style="font-size:10px;background:#e8f0fe;border:1px solid #c5d3f5;color:#1a73e8;padding:2px 10px;border-radius:20px;height:20px;line-height:1;cursor:pointer;font-weight:600">📈 גרף</button>
                        <button class="win-btn win-max" onclick="toggleMaximize('win-portfolio')"></button>
                        <button class="win-btn win-close" onclick="this.closest('.card').style.display='none'"></button>
                    </div>
                </div>
                <div class="card-body" dir="ltr">
                    <div class="scroll-container">
                        <table id="portfolio-table">
                            <thead>
                                <tr>
                                    <th class="whitespace-nowrap text-left">מניה</th>
                                    <th class="pct-col text-center">P/L%</th>
                                    <th class="text-right" style="font-size:9px">P/L ₪</th>
                                    <th class="pct-col text-center">יום%</th>
                                    <th class="text-right">שווי</th>
                                    <th class="text-center">פעולה</th>
                                </tr>
                            </thead>
                            <tbody id="portfolio-list"></tbody>
                        </table>
                    </div>
                    <div class="portfolio-footer">
                        <span>סה"כ</span>
                        <span id="total-portfolio-value">₪0.00</span>
                    </div>
                </div>
            </div>

            <!-- Simulator Window -->
            <div id="win-simulator" class="card">
                <div class="window-header">
                    <h3>סימולטור</h3>
                    <div class="window-controls">
                        <button class="win-btn win-max" onclick="toggleMaximize('win-simulator')"></button>
                        <button class="win-btn win-close" onclick="this.closest('.card').style.display='none'"></button>
                    </div>
                </div>
                <div class="card-body" dir="ltr">
                    <div style="display:flex;gap:6px;margin-bottom:6px">
                        <input type="text" id="sim-symbol" placeholder="סימול / שם" style="background:#f1f3f4;border:1px solid rgba(0,0,0,0.15);color:#202124;padding:5px 8px;border-radius:8px;font-size:12px;width:100%;outline:none" onkeydown="if(event.key==='Enter') buyStock()">
                        <input type="number" id="sim-qty" placeholder="כמות" min="1" style="background:#f1f3f4;border:1px solid rgba(0,0,0,0.15);color:#202124;padding:5px 8px;border-radius:8px;font-size:12px;width:100%;outline:none" onkeydown="if(event.key==='Enter') buyStock()">
                    </div>
                    <div style="display:flex;gap:6px;margin-bottom:8px">
                        <button id="buy-btn" style="flex:1;background:#34a853;color:#fff;padding:6px 0;border-radius:20px;font-weight:700;font-size:12px;border:none;cursor:pointer">קנה</button>
                        <button id="sell-btn-sim" style="flex:1;background:#ea4335;color:#fff;padding:6px 0;border-radius:20px;font-weight:700;font-size:12px;border:none;cursor:pointer">מכור</button>
                    </div>
                    <div style="font-size:9px;color:#5f6368;margin-bottom:4px;font-weight:600">היסטוריית עסקאות</div>
                    <div class="scroll-container" style="max-height:120px">
                        <table style="width:100%;border-collapse:collapse;font-size:9px">
                            <thead>
                                <tr style="color:#5f6368">
                                    <th style="text-align:left;padding:1px 3px">שעה</th>
                                    <th style="text-align:left;padding:1px 3px">פעולה</th>
                                    <th style="text-align:left;padding:1px 3px">סימול</th>
                                    <th style="text-align:right;padding:1px 3px">כמות</th>
                                    <th style="text-align:right;padding:1px 3px">מחיר</th>
                                </tr>
                            </thead>
                            <tbody id="tx-history-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Portfolio Chart Window -->
            <div id="win-portfolio-chart" class="card" style="display:none">
                <div class="window-header">
                    <h3>📈 ביצועי תיק</h3>
                    <div class="window-controls">
                        <button class="win-btn win-max" onclick="toggleMaximize('win-portfolio-chart')"></button>
                        <button class="win-btn win-close" onclick="this.closest('.card').style.display='none'"></button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="flex-1 w-full overflow-hidden relative" style="min-height:0;position:relative;background:#ffffff;border-radius:8px">
                        <div id="portfolioChart" style="position:absolute;inset:0"></div>
                    </div>
                </div>
            </div>

            <!-- Search Window -->
            <div id="win-search" class="card">
                <div class="window-header" style="padding:6px 12px">
                    <div style="display:flex;gap:8px;flex:1;align-items:center" dir="ltr">
                        <span style="font-size:13px">🔍</span>
                        <input type="text" id="search-symbol" placeholder="חפש מניה (e.g. לאומי / LUMI.TA)"
                            style="background:#f1f3f4;border:1px solid rgba(0,0,0,0.15);color:#202124;padding:4px 12px;border-radius:20px;font-size:12px;flex:1;outline:none;height:26px"
                            onkeydown="if(event.key==='Enter') searchSymbol()">
                        <button onclick="searchSymbol()" style="background:#1a73e8;color:#fff;padding:0 16px;border-radius:20px;font-size:12px;font-weight:600;border:none;cursor:pointer;height:26px">חפש</button>
                        <span id="search-error" style="font-size:10px;color:#ea4335;white-space:nowrap" class="hidden">לא נמצא</span>
                    </div>
                </div>
            </div>

            <!-- AI Chat Window -->
            <div id="win-ai-chat" class="card" style="display:flex;flex-direction:column">
                <div class="window-header">
                    <h3>🤖 יועץ AI</h3>
                    <div class="window-controls">
                        <button onclick="clearAIChat()" style="font-size:9px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#9aa0a6;padding:0 8px;border-radius:20px;height:18px;line-height:1;cursor:pointer">נקה</button>
                        <button class="win-btn win-max" onclick="toggleMaximize('win-ai-chat')"></button>
                        <button class="win-btn win-close" onclick="this.closest('.card').style.display='none'"></button>
                    </div>
                </div>
                <div id="ai-messages" style="flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;min-height:0"></div>
                <div style="display:flex;gap:6px;padding:6px 8px;border-top:1px solid rgba(0,0,0,0.08)">
                    <input id="ai-input" type="text" placeholder="שאל על התיק שלך..." dir="rtl"
                        style="flex:1;background:#f1f3f4;border:1px solid rgba(0,0,0,0.1);border-radius:20px;padding:0 12px;font-size:12px;color:#202124;outline:none;height:28px"
                        onkeydown="if(event.key==='Enter') sendAIMessage()" />
                    <button onclick="sendAIMessage()" id="ai-send-btn"
                        style="background:#1a73e8;color:#fff;padding:0 14px;border-radius:20px;font-size:12px;font-weight:600;border:none;cursor:pointer;height:28px">שלח</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
      }
    </script>
</body>
</html>
