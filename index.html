<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Station Pro</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0b0e11">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bursa">
    <link rel="apple-touch-icon" href="/icon-192.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white">
    <div class="main-wrapper">
        <!-- Thin Header Bar -->
        <header class="top-bar px-2" style="justify-content:space-between">
            <h1 class="text-xs font-bold text-[#87ceeb] flex items-center gap-2">
                בורסת תל אביב
                <span id="market-status" class="text-[8px]">●</span>
                <span id="market-label" class="text-[8px] font-mono font-bold"></span>
                <span id="data-status" class="text-[8px] font-mono px-1 rounded" style="background:#1e2430;color:#424c5c">SIM</span>
            </h1>
            <div class="flex items-center gap-3" dir="ltr">
                <span class="text-[9px] font-mono" style="color:#b7791f">⏱ נתונים מעוכבים ~15 דקות</span>
                <span id="last-update" class="text-[9px] font-mono" style="color:#424c5c"></span>
            </div>
        </header>

        <!-- Slim Ticker -->
        <div class="ticker-row">
            <div class="flex-grow overflow-hidden h-full flex items-center">
                <div id="ticker-content" class="ticker-scroll"></div>   
            </div>
        </div>

        <!-- Dashboard Area -->
        <div id="dashboard" class="dashboard-grid">
            <!-- Reset Layout Button at Top Left -->
            <button onclick="resetWindows()" class="reset-layout-btn" dir="ltr">
                <span>↺</span> Reset Layout
            </button>

            <!-- Indices Window -->
            <div id="win-indices-tase" class="card">
                <div class="window-header">
                    <h3>TA-35 Index <span id="ta35-status" class="text-[9px] font-mono font-bold ml-1" style="color:#f6465d"></span></h3>
                    <div class="window-controls">
                        <div class="timeframe-buttons" id="index-tf-btns">
                            <button class="active" onclick="updateTimeframe('daily')">D</button>
                            <button onclick="updateTimeframe('weekly')">W</button>
                            <button onclick="updateTimeframe('monthly')">M</button>
                            <button onclick="updateTimeframe('3months')">3M</button>
                        </div>
                        <button class="win-btn win-max" onclick="toggleMaximize('win-indices-tase')"></button>
                        <button class="win-btn win-close" onclick="this.closest('.card').style.display='none'"></button>
                    </div>
                </div>
                <div class="card-body" dir="ltr">
                    <div class="flex items-baseline gap-2 mb-1 px-1">
                        <span id="ta35-price" class="font-mono font-bold text-sm text-white"></span>
                        <span id="ta35-pct" class="font-mono font-bold text-xs"></span>
                        <span id="ta35-pts" class="font-mono text-[10px] text-[#848e9c]"></span>
                    </div>
                    <div class="flex-1 w-full overflow-hidden relative" style="min-height:0;position:relative">
                        <div id="indexChart" style="position:absolute;inset:0"></div>
                    </div>
                </div>
            </div>

            <!-- Leading Stocks Window -->
            <div id="win-stocks" class="card">
                <div class="window-header">
                    <h3>מניות מובילות</h3>
                    <div class="window-controls">
                        <button class="win-btn win-max" onclick="toggleMaximize('win-stocks')"></button>
                        <button class="win-btn win-close" onclick="this.closest('.card').style.display='none'"></button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="scroll-container">
                        <table id="stock-table">
                            <thead>
                                <tr>
                                    <th class="text-right">מניה</th>
                                    <th class="text-right">מחיר</th>
                                    <th class="pct-col text-center">שינוי%</th>
                                </tr>
                            </thead>
                            <tbody id="stock-list"></tbody>
                        </table>
                    </div>
                    <button id="refresh-btn" class="mt-1 text-[10px] py-1 bg-[#2b3139] border border-[#474d57] rounded">רענן</button>
                </div>
            </div>


            <!-- Main Chart Window -->
            <div id="win-main-chart" class="card">
                <div class="window-header" dir="ltr">
                    <div class="flex items-center gap-2">
                        <h2 id="main-chart-title" style="text-transform:none;font-size:0.75rem;color:#e0c97a">לאומי</h2>
                        <span id="main-chart-price" class="font-mono text-[11px] text-white"></span>
                        <span id="main-chart-pct"   class="font-mono text-[10px]"></span>
                    </div>
                    <div class="window-controls">
                        <div class="timeframe-buttons" id="main-tf-btns">
                            <button class="active" onclick="updateMainTimeframe('daily')">D</button>
                            <button onclick="updateMainTimeframe('weekly')">W</button>
                            <button onclick="updateMainTimeframe('monthly')">M</button>
                            <button onclick="updateMainTimeframe('3months')">3M</button>
                        </div>
                        <button class="win-btn win-max" onclick="toggleMaximize('win-main-chart')"></button>
                        <button class="win-btn win-close" onclick="this.closest('.card').style.display='none'"></button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="flex-1 w-full overflow-hidden relative bg-[#0b0e11] rounded" style="min-height:0;position:relative">
                        <div id="stockChart" style="position:absolute;inset:0"></div>
                    </div>
                </div>
            </div>

            <!-- Portfolio Window -->
            <div id="win-portfolio" class="card">
                <div class="window-header">
                    <h3>My Portfolio</h3>
                    <div class="window-controls">
                        <button class="win-btn win-max" onclick="toggleMaximize('win-portfolio')"></button>
                        <button class="win-btn win-close" onclick="this.closest('.card').style.display='none'"></button>
                    </div>
                </div>
                <div class="card-body" dir="ltr">
                    <div class="scroll-container">
                        <table id="portfolio-table">
                            <thead>
                                <tr>
                                    <th class="whitespace-nowrap text-left">Sym</th>
                                    <th class="pct-col text-center">P/L%</th>
                                    <th class="pct-col text-center">Day%</th>
                                    <th class="text-right">Value</th>
                                    <th class="text-center">Act</th>
                                </tr>
                            </thead>
                            <tbody id="portfolio-list"></tbody>
                        </table>    
                    </div>
                    <div class="portfolio-footer">
                        <span>Total:</span>
                        <span id="total-portfolio-value">₪0.00</span>
                    </div>
                </div>
            </div>

            <!-- Simulator Window -->
            <div id="win-simulator" class="card">
                <div class="window-header">
                    <h3>Simulator</h3>
                    <div class="window-controls">
                        <button class="win-btn win-max" onclick="toggleMaximize('win-simulator')"></button>
                        <button class="win-btn win-close" onclick="this.closest('.card').style.display='none'"></button>
                    </div>
                </div>
                <div class="card-body" dir="ltr">
                    <div class="flex gap-2 mb-1">
                        <input type="text" id="sim-symbol" placeholder="Sym" class="bg-[#1e2329] border border-[#363c4e] text-white p-1 rounded text-xs w-full outline-none">
                        <input type="number" id="sim-qty" placeholder="Qty" min="1" class="bg-[#1e2329] border border-[#363c4e] text-white p-1 rounded text-xs w-full outline-none">
                    </div>
                    <div class="flex gap-2 mb-2">
                        <button id="buy-btn" class="flex-1 bg-[#0ecb81] text-[#0b0e11] py-1 rounded font-bold text-xs">Buy</button>
                        <button id="sell-btn-sim" class="flex-1 bg-[#f6465d] text-white py-1 rounded font-bold text-xs">Sell</button>
                    </div>
                    <div class="text-[9px] text-[#848e9c] mb-1 font-bold">היסטוריית עסקאות</div>
                    <div class="scroll-container" style="max-height:120px">
                        <table style="width:100%;border-collapse:collapse;font-size:9px">
                            <thead>
                                <tr style="color:#848e9c">
                                    <th style="text-align:left;padding:1px 3px">שעה</th>
                                    <th style="text-align:left;padding:1px 3px">פעולה</th>
                                    <th style="text-align:left;padding:1px 3px">סימול</th>
                                    <th style="text-align:right;padding:1px 3px">כמות</th>
                                    <th style="text-align:right;padding:1px 3px">מחיר</th>
                                </tr>
                            </thead>
                            <tbody id="tx-history-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Search Window -->
            <div id="win-search" class="card">
                <div class="window-header" style="padding:4px 10px">
                    <div class="flex gap-2 flex-1 items-center" dir="ltr">
                        <span class="text-[10px] font-bold text-[#c8961e] whitespace-nowrap">🔍 Search</span>
                        <input type="text" id="search-symbol" placeholder="סימול (e.g. לאומי / LUMI.TA)"
                            class="bg-[#1e2329] border border-[#363c4e] text-white px-2 rounded text-xs flex-1 outline-none"
                            style="height:24px"
                            onkeydown="if(event.key==='Enter') searchSymbol()">
                        <button onclick="searchSymbol()" class="bg-[#2b3139] border border-[#474d57] text-white px-3 rounded text-xs font-bold" style="height:24px">Go</button>
                        <span id="search-error" class="text-[10px] text-[#f6465d] whitespace-nowrap hidden">לא נמצא</span>
                    </div>
                </div>
            </div>
            <!-- AI Chat Window -->
            <div id="win-ai-chat" class="card" style="display:flex;flex-direction:column">
                <div class="window-header">
                    <h3>🤖 יועץ AI</h3>
                    <div class="window-controls">
                        <button onclick="clearAIChat()" style="font-size:9px;background:#2b3139;border:1px solid #474d57;color:#eaecef;padding:0 6px;border-radius:3px;height:18px;line-height:1">נקה</button>
                        <button class="win-btn win-max" onclick="toggleMaximize('win-ai-chat')"></button>
                        <button class="win-btn win-close" onclick="this.closest('.card').style.display='none'"></button>
                    </div>
                </div>
                <div id="ai-messages" class="flex-1 overflow-y-auto px-2 py-1 space-y-1" style="min-height:0"></div>
                <div class="flex gap-1 p-1 border-t border-[#2b3139]">
                    <input id="ai-input" type="text" placeholder="שאל על התיק שלך..." dir="rtl"
                        class="flex-1 bg-[#1e2430] border border-[#474d57] rounded px-2 text-[12px] text-white outline-none"
                        style="height:28px"
                        onkeydown="if(event.key==='Enter') sendAIMessage()" />
                    <button onclick="sendAIMessage()" id="ai-send-btn"
                        class="bg-[#0ecb81] text-[#0b0e11] px-3 rounded text-[12px] font-bold hover:opacity-80"
                        style="height:28px">שלח</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Dynamic windows will be appended to the dashboard -->
    <script src="script.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
      }
    </script>
</body>
</html>
