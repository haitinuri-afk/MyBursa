<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#1a73e8">
<title>בורסה AI — מובייל</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f1f3f4;
    --surface:  #ffffff;
    --primary:  #1a73e8;
    --text:     #202124;
    --text2:    #5f6368;
    --border:   rgba(0,0,0,0.12);
    --up:       #1e8e3e;
    --down:     #d93025;
    --radius:   16px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:      #111;
      --surface: #1e1e1e;
      --text:    #e8eaed;
      --text2:   #9aa0a6;
      --border:  rgba(255,255,255,0.1);
    }
  }

  body {
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--primary);
    color: #fff;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  header h1 { font-size: 1rem; font-weight: 600; }
  #server-btn {
    background: rgba(255,255,255,.2);
    border: none;
    color: #fff;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    cursor: pointer;
    white-space: nowrap;
  }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
  }

  .msg {
    max-width: 88%;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 0.9rem;
    line-height: 1.55;
    word-break: break-word;
  }
  .msg.user {
    align-self: flex-start;
    background: var(--primary);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.ai {
    align-self: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
    white-space: pre-wrap;
  }
  .msg.system {
    align-self: center;
    background: transparent;
    color: var(--text2);
    font-size: 0.78rem;
    text-align: center;
    padding: 4px 8px;
  }
  .msg.error {
    align-self: flex-end;
    background: #fce8e6;
    color: var(--down);
    border: 1px solid #f5c6c3;
  }

  /* Typing indicator */
  .typing { display: flex; gap: 4px; padding: 12px 16px; align-items: center; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text2);
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30%          { transform: translateY(-6px); }
  }

  /* ── Input bar ── */
  #input-bar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  #question {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 10px 16px;
    font-size: 0.95rem;
    background: var(--bg);
    color: var(--text);
    resize: none;
    max-height: 120px;
    line-height: 1.4;
    outline: none;
    font-family: inherit;
  }
  #question:focus { border-color: var(--primary); }
  #send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--primary);
    border: none;
    color: #fff;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity .15s;
  }
  #send-btn:disabled { opacity: .45; cursor: default; }

  /* ── Server modal ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.5);
    display: flex; align-items: flex-end;
    z-index: 100;
  }
  .overlay.hidden { display: none; }
  .modal {
    background: var(--surface);
    width: 100%;
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 32px;
  }
  .modal h2 { font-size: 1rem; margin-bottom: 16px; }
  .modal input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 0.9rem;
    background: var(--bg);
    color: var(--text);
    outline: none;
    margin-bottom: 12px;
    direction: ltr;
  }
  .modal input:focus { border-color: var(--primary); }
  .modal button {
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    border: none;
    background: var(--primary);
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
    font-weight: 600;
  }

  /* Markdown-ish styling */
  .msg.ai strong { font-weight: 700; }
  .msg.ai em { font-style: italic; color: var(--text2); }
</style>
</head>
<body>

<header>
  <h1>📈 בורסה AI</h1>
  <button id="server-btn" onclick="openModal()">⚙️ שרת</button>
</header>

<div id="messages">
  <div class="msg system">שלום! שאל אותי כל שאלה על שוק ההון הישראלי 🇮🇱</div>
</div>

<div id="input-bar">
  <textarea id="question" placeholder="שאל שאלה..." rows="1"></textarea>
  <button id="send-btn" onclick="sendQuestion()">➤</button>
</div>

<!-- Server config modal -->
<div class="overlay hidden" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>⚙️ כתובת השרת</h2>
    <input type="url" id="server-url" placeholder="https://your-app.onrender.com" dir="ltr">
    <button onclick="saveServer()">שמור</button>
  </div>
</div>

<script>
const DEFAULT_SERVER = window.location.origin.includes('localhost')
    ? 'http://localhost:3000'
    : 'https://mybursa.onrender.com';

let SERVER = localStorage.getItem('bursa_server') || DEFAULT_SERVER;

// ── Auto-resize textarea ──────────────────────────────────────────────────
const ta = document.getElementById('question');
ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
});
ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
});

// ── Messages ──────────────────────────────────────────────────────────────
function renderMarkdown(text) {
    let s = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
    s = s.replace(/\*([^*\n]+?)\*/g, '<em>$1</em>');
    s = s.replace(/^(\d+)\.\s+(.+)$/gm, '<div style="margin:.2em 0"><strong>$1.</strong> $2</div>');
    s = s.replace(/^[-•]\s+(.+)$/gm, '<div style="margin:.2em 0">• $1</div>');
    s = s.replace(/\n/g, '<br>');
    return s;
}

function addMsg(text, cls) {
    const div = document.createElement('div');
    div.className = `msg ${cls}`;
    if (cls === 'ai') {
        div.innerHTML = renderMarkdown(text);
    } else {
        div.textContent = text;
    }
    document.getElementById('messages').appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    return div;
}

function addTyping() {
    const div = document.createElement('div');
    div.className = 'msg ai typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    document.getElementById('messages').appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    return div;
}

// ── Send question ─────────────────────────────────────────────────────────
let busy = false;

async function sendQuestion() {
    const q = ta.value.trim();
    if (!q || busy) return;

    if (!SERVER) { openModal(); return; }

    busy = true;
    document.getElementById('send-btn').disabled = true;
    ta.value = '';
    ta.style.height = 'auto';

    addMsg(q, 'user');
    const typing = addTyping();

    try {
        const res = await fetch(`${SERVER}/api/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                messages: [{ role: 'user', content: q }],
                mobile: true     // hint to server to keep answers concise
            }),
            signal: AbortSignal.timeout(30_000),
        });

        typing.remove();

        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            addMsg(err.error || `שגיאה ${res.status}`, 'error');
            return;
        }

        const data = await res.json();
        const answer = data.content ?? data.message ?? data.reply ?? JSON.stringify(data);
        addMsg(answer, 'ai');

    } catch(e) {
        typing.remove();
        if (e.name === 'TimeoutError') addMsg('הבקשה לקחה יותר מדי זמן. נסה שוב.', 'error');
        else addMsg(`שגיאת חיבור: ${e.message}`, 'error');
    } finally {
        busy = false;
        document.getElementById('send-btn').disabled = false;
    }
}

// ── Server modal ──────────────────────────────────────────────────────────
function openModal() {
    document.getElementById('server-url').value = SERVER;
    document.getElementById('overlay').classList.remove('hidden');
}
function closeModal() {
    document.getElementById('overlay').classList.add('hidden');
}
function saveServer() {
    const url = document.getElementById('server-url').value.trim().replace(/\/$/, '');
    if (!url) return;
    SERVER = url;
    localStorage.setItem('bursa_server', SERVER);
    closeModal();
    addMsg(`מחובר ל: ${SERVER}`, 'system');
}

// Show server button label
document.getElementById('server-btn').title = SERVER || 'לא מוגדר';
</script>
</body>
</html>
