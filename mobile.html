<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MyBursa</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0f0f1a;
  --surface: #1a1a2e;
  --card:    #1e1e35;
  --primary: #4f8ef7;
  --text:    #e8eaed;
  --text2:   #9aa0a6;
  --up:      #34a853;
  --down:    #ea4335;
  --border:  rgba(255,255,255,0.08);
  --radius:  16px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

html, body { height: 100%; }
body {
  font-family: -apple-system, "Segoe UI", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  max-height: -webkit-fill-available;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: fixed;
  width: 100%;
}

/* ── Header ── */
header {
  background: var(--surface);
  padding: calc(12px + var(--safe-top)) 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-title { font-size: 1.05rem; font-weight: 700; letter-spacing: .3px; }
.header-actions { display: flex; gap: 8px; }
.hbtn {
  background: var(--border);
  border: none; color: var(--text2);
  padding: 6px 12px; border-radius: 20px;
  font-size: 0.75rem; cursor: pointer;
}

/* ── Main scroll area ── */
#main {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 14px 14px calc(90px + var(--safe-bot));
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── Portfolio summary card ── */
.summary-card {
  background: linear-gradient(135deg, #1a2a5e 0%, #1a1a2e 100%);
  border: 1px solid rgba(79,142,247,.25);
  border-radius: var(--radius);
  padding: 18px 16px;
}
.summary-label { font-size: 0.75rem; color: var(--text2); margin-bottom: 4px; }
.summary-value { font-size: 1.7rem; font-weight: 700; letter-spacing: -.5px; }
.summary-sub { font-size: 0.8rem; margin-top: 6px; display: flex; gap: 12px; flex-wrap: wrap; }
.pill {
  padding: 3px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 600;
}
.pill.up { background: rgba(52,168,83,.18); color: var(--up); }
.pill.down { background: rgba(234,67,53,.18); color: var(--down); }
.pill.neutral { background: var(--border); color: var(--text2); }

/* ── Section title ── */
.section-title {
  font-size: 0.72rem; font-weight: 600;
  color: var(--text2); letter-spacing: .8px;
  text-transform: uppercase; padding: 0 2px;
}

/* ── Stock row ── */
.stock-row {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.stock-name { font-size: 0.9rem; font-weight: 600; }
.stock-meta { font-size: 0.72rem; color: var(--text2); margin-top: 2px; }
.stock-right { text-align: left; }
.stock-pct {
  font-size: 0.9rem; font-weight: 700;
}
.stock-pct.up { color: var(--up); }
.stock-pct.down { color: var(--down); }
.stock-price { font-size: 0.72rem; color: var(--text2); margin-top: 2px; }

/* ── Loading skeleton ── */
.skeleton {
  background: linear-gradient(90deg, var(--card) 25%, var(--surface) 50%, var(--card) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 8px; height: 16px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ── Tabs ── */
.tab-btn {
  flex: 1; padding: 8px 4px; border: none;
  background: var(--card); color: var(--text2);
  border-radius: 10px; font-size: 0.78rem;
  font-weight: 600; cursor: pointer;
  transition: background .2s, color .2s;
}
.tab-btn.active { background: var(--primary); color: #fff; }

/* ── Detail card ── */
.detail-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  display: flex; flex-direction: column; gap: 8px;
}
.detail-card .dc-header {
  display: flex; justify-content: space-between; align-items: center;
}
.detail-card .dc-name { font-size: 0.95rem; font-weight: 700; }
.detail-card .dc-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 6px 12px;
}
.detail-card .dc-item label {
  font-size: 0.65rem; color: var(--text2);
  display: block; margin-bottom: 1px;
}
.detail-card .dc-item span { font-size: 0.82rem; font-weight: 600; }

/* ── TX row ── */
.tx-row {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.tx-row .tx-left { font-size: 0.82rem; }
.tx-row .tx-name { font-weight: 600; }
.tx-row .tx-meta { font-size: 0.7rem; color: var(--text2); margin-top: 2px; }
.tx-row .tx-right { text-align: left; font-size: 0.82rem; font-weight: 600; }

/* ── Status bar ── */
#status-bar {
  font-size: 0.72rem; color: var(--text2);
  text-align: center; padding: 4px;
}

/* ── FAB chat button ── */
#chat-fab {
  position: fixed;
  bottom: calc(24px + var(--safe-bot));
  left: 20px;
  width: 58px; height: 58px;
  border-radius: 50%;
  background: var(--primary);
  border: none;
  color: #fff;
  font-size: 1.5rem;
  box-shadow: 0 4px 20px rgba(79,142,247,.5);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 90;
  transition: transform .2s, box-shadow .2s;
  -webkit-tap-highlight-color: transparent;
}
#chat-fab:active { transform: scale(.92); }
#chat-fab .badge {
  position: absolute; top: -2px; right: -2px;
  width: 18px; height: 18px;
  background: #ea4335; border-radius: 50%;
  font-size: 0.65rem; font-weight: 700;
  display: none; align-items: center; justify-content: center;
}

/* ── Chat drawer ── */
#chat-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity .3s;
  will-change: opacity;
}
#chat-backdrop.open { opacity: 1; pointer-events: all; }

#chat-drawer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 88%;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  z-index: 101;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform .35s cubic-bezier(.4,0,.2,1);
  will-change: transform;
}
#chat-drawer.open { transform: translateY(0); }

.drawer-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 10px auto 0;
  flex-shrink: 0;
}
.drawer-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.drawer-title { font-size: 0.95rem; font-weight: 700; }
#drawer-close {
  background: var(--border); border: none; color: var(--text2);
  width: 32px; height: 32px; border-radius: 50%;
  font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* ── Chat messages ── */
#messages {
  flex: 1; overflow-y: auto;
  padding: 12px; display: flex;
  flex-direction: column; gap: 10px;
  -webkit-overflow-scrolling: touch;
}
.msg {
  max-width: 88%; padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 0.88rem; line-height: 1.55;
  word-break: break-word;
}
.msg.user {
  align-self: flex-start;
  background: var(--primary); color: #fff;
  border-bottom-right-radius: 4px;
}
.msg.ai {
  align-self: flex-end;
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  white-space: pre-wrap;
}
.msg.system {
  align-self: center; background: transparent;
  color: var(--text2); font-size: 0.75rem;
  text-align: center; padding: 4px 8px;
}
.msg.error {
  align-self: flex-end;
  background: rgba(234,67,53,.12);
  color: var(--down);
  border: 1px solid rgba(234,67,53,.3);
}
.msg.ai strong { font-weight: 700; }
.msg.ai em { font-style: italic; color: var(--text2); }

.typing { display: flex; gap: 4px; padding: 12px 16px; align-items: center; }
.typing span {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text2); animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* ── Input bar ── */
#input-bar {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 10px 12px;
  padding-bottom: calc(10px + var(--safe-bot));
  display: flex; gap: 8px; align-items: flex-end;
  flex-shrink: 0;
}
#question {
  flex: 1; border: 1.5px solid var(--border);
  border-radius: 24px; padding: 10px 16px;
  font-size: 0.9rem; background: var(--bg);
  color: var(--text); resize: none;
  max-height: 120px; line-height: 1.4;
  outline: none; font-family: inherit;
}
#question:focus { border-color: var(--primary); }
#send-btn {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--primary); border: none;
  color: #fff; font-size: 1.2rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: opacity .15s;
}
#send-btn:disabled { opacity: .4; cursor: default; }

/* ── Server modal ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  display: flex; align-items: flex-end;
  z-index: 200;
}
.overlay.hidden { display: none; }
.modal {
  background: var(--surface); width: 100%;
  border-radius: 24px 24px 0 0;
  padding: 24px 20px calc(32px + var(--safe-bot));
}
.modal h2 { font-size: 1rem; margin-bottom: 16px; }
.modal input {
  width: 100%; border: 1.5px solid var(--border);
  border-radius: 12px; padding: 12px 14px;
  font-size: 0.9rem; background: var(--bg);
  color: var(--text); outline: none;
  margin-bottom: 12px; direction: ltr;
}
.modal input:focus { border-color: var(--primary); }
.modal button {
  width: 100%; padding: 13px; border-radius: 12px;
  border: none; background: var(--primary);
  color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600;
}
</style>
</head>
<body>

<header>
  <span class="header-title">📈 MyBursa</span>
  <div class="header-actions">
    <button class="hbtn" onclick="showLatestScans()">🔍 דוחות</button>
    <button class="hbtn" id="server-btn" onclick="openModal()">⚙️</button>
  </div>
</header>

<div id="main">
  <!-- Portfolio summary -->
  <div class="summary-card" id="summary-card">
    <div class="summary-label">שווי תיק</div>
    <div class="summary-value" id="total-val">—</div>
    <div class="summary-sub" id="summary-sub">
      <span class="pill neutral">טוען...</span>
    </div>
  </div>

  <!-- Tabs -->
  <div style="display:flex;gap:8px;padding:2px 0">
    <button class="tab-btn active" id="tab-holdings" onclick="switchTab('holdings')">📋 אחזקות</button>
    <button class="tab-btn" id="tab-analysis" onclick="switchTab('analysis')">📊 ניתוח</button>
    <button class="tab-btn" id="tab-txs" onclick="switchTab('txs')">🔄 עסקאות</button>
  </div>

  <!-- Holdings tab -->
  <div id="tab-holdings-content">
    <div id="stock-list">
      <div class="stock-row"><div style="flex:1"><div class="skeleton" style="width:60%;margin-bottom:8px"></div><div class="skeleton" style="width:40%"></div></div></div>
      <div class="stock-row"><div style="flex:1"><div class="skeleton" style="width:55%;margin-bottom:8px"></div><div class="skeleton" style="width:35%"></div></div></div>
    </div>
  </div>

  <!-- Analysis tab -->
  <div id="tab-analysis-content" style="display:none">
    <div id="analysis-list"></div>
  </div>

  <!-- Transactions tab -->
  <div id="tab-txs-content" style="display:none">
    <div id="tx-list"></div>
  </div>

  <div id="status-bar"></div>
</div>

<!-- FAB -->
<button id="chat-fab" onclick="openChat()">
  💬
  <span class="badge" id="chat-badge"></span>
</button>

<!-- Chat drawer -->
<div id="chat-backdrop" onclick="closeChat()"></div>
<div id="chat-drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <span class="drawer-title">🤖 יועץ AI</span>
    <button id="drawer-close" onclick="closeChat()">✕</button>
  </div>
  <div id="messages">
    <div class="msg system">שאל אותי כל שאלה על התיק שלך 💼</div>
  </div>
  <div id="input-bar">
    <label title="העלה דוח PDF" style="width:40px;height:40px;border-radius:50%;background:var(--card);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;flex-shrink:0">
      📄<input type="file" accept="application/pdf" style="display:none" onchange="uploadPDF(this)">
    </label>
    <textarea id="question" placeholder="שאל על התיק..." rows="1"></textarea>
    <button id="send-btn" onclick="sendQuestion()">➤</button>
  </div>
</div>

<!-- Server config modal -->
<div class="overlay hidden" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>⚙️ כתובת השרת</h2>
    <input type="url" id="server-url" placeholder="https://your-app.onrender.com" dir="ltr">
    <button onclick="saveServer()">שמור</button>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const DEFAULT_SERVER = window.location.origin.includes('localhost')
    ? 'http://localhost:3000'
    : 'https://mybursa.onrender.com';
let SERVER = localStorage.getItem('bursa_server') || DEFAULT_SERVER;

// ── Chat drawer ───────────────────────────────────────────────────────────────
let _unread = 0;
function openChat() {
    document.getElementById('chat-drawer').classList.add('open');
    document.getElementById('chat-backdrop').classList.add('open');
    _unread = 0;
    document.getElementById('chat-badge').style.display = 'none';
    setTimeout(() => document.getElementById('question').focus(), 350);
}
function closeChat() {
    document.getElementById('chat-drawer').classList.remove('open');
    document.getElementById('chat-backdrop').classList.remove('open');
}

// ── Portfolio data ────────────────────────────────────────────────────────────
const STOCK_SYMBOLS = {
  "מדד תא-35":"^TA35","מדד תא-90":"^TA90",
  "לאומי":"LUMI.TA","פועלים":"POLI.TA","דיסקונט":"DSCT.TA","מזרחי טפחות":"MZTF.TA",
  "אלביט":"ESLT.TA","נייס":"NICE.TA","טאוור":"TSEM.TA","אאורה":"AURA.TA",
  "טבע":"TEVA.TA","כיל":"ICL.TA","הבינלאומי":"FIBI.TA","בנק ירושלים":"JBNK.TA",
  "אי.בי.אי":"IBI.TA","הפניקס":"PHOE.TA","הראל":"HARL.TA","כלל ביטוח":"CLIS.TA",
  "עזריאלי":"AZRG.TA","מליסרון":"MLSR.TA","אמות":"AMOT.TA","ביג":"BIG.TA",
  "גב ים":"GVYM.TA","שיכון ובינוי":"SKBN.TA","ריט1":"RIT1.TA",
  "אנרג'יקס":"ENRG.TA","אנלייט":"ENLT.TA","אורמת":"ORA.TA","קבוצת דלק":"DLEKG.TA",
  "בזק":"BEZQ.TA","סלקום":"CEL.TA","פרטנר":"PTNR.TA",
  "שטראוס":"STRS.TA","שופרסל":"SAE.TA","פוקס":"FOX.TA","רמי לוי":"RMLI.TA",
};

function switchTab(tab) {
    ['holdings','analysis','txs'].forEach(t => {
        document.getElementById(`tab-${t}-content`).style.display = t === tab ? '' : 'none';
        document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    });
}

async function loadPortfolioView() {
    if (!SERVER) return;
    try {
        const pRes = await fetch(`${SERVER}/api/portfolio`, { signal: AbortSignal.timeout(8000) });
        if (!pRes.ok) return;
        const pd = await pRes.json();
        const portfolio = pd.portfolio ?? {};
        const txHistory = pd.transactionHistory ?? [];
        const names = Object.keys(portfolio);
        if (!names.length) return;

        // First buy date per stock
        const firstBuy = {};
        [...txHistory].reverse().forEach(tx => {
            if ((tx.action === 'Buy' || tx.type === 'buy') && !firstBuy[tx.symbol ?? tx.name]) {
                firstBuy[tx.symbol ?? tx.name] = tx.date ?? tx.time ?? '';
            }
        });

        // Fetch prices
        const syms = names.map(n => STOCK_SYMBOLS[n]).filter(Boolean);
        const bRes = await fetch(`${SERVER}/api/stock/batch?symbols=${syms.join(',')}`, { signal: AbortSignal.timeout(15000) });
        if (!bRes.ok) return;
        const bd = await bRes.json();
        const qMap = Object.fromEntries((bd.quotes ?? []).map(q => [q.symbol, q]));

        let totalVal = 0, totalCost = 0, totalDay = 0;
        const rows = [];

        names.forEach(name => {
            const h   = portfolio[name];
            const sym = STOCK_SYMBOLS[name];
            const q   = sym && qMap[sym];
            if (!q?.regularMarketPrice) return;
            const cur     = q.regularMarketPrice;
            const prev    = q.regularMarketPreviousClose ?? cur;
            const qty     = h.qty ?? h.quantity ?? 0;
            const avg     = h.buyPrice ?? 0;
            const cost    = h.totalCost ?? qty * avg;
            const dayPct  = prev > 0 ? (cur - prev) / prev * 100 : 0;
            const dayGain = (cur - prev) * qty;
            const totPct  = avg > 0 ? (cur - avg) / avg * 100 : 0;
            const totGain = (cur - avg) * qty;
            const buyDate = firstBuy[name] ?? '';
            totalVal  += cur * qty;
            totalCost += cost;
            totalDay  += dayGain;
            rows.push({ name, cur, prev, qty, avg, cost, dayPct, dayGain, totPct, totGain, sym, buyDate });
        });

        rows.sort((a, b) => b.dayPct - a.dayPct);

        // ── Summary ──
        const fmt  = n => Math.abs(Math.round(n)).toLocaleString('he-IL');
        const fmtP = n => (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
        document.getElementById('total-val').textContent = `₪${fmt(totalVal)}`;
        const plPct = totalCost > 0 ? ((totalVal - totalCost) / totalCost * 100) : 0;
        const plIls = totalVal - totalCost;
        document.getElementById('summary-sub').innerHTML =
            `<span class="pill ${totalDay>=0?'up':'down'}">${totalDay>=0?'+':''}₪${fmt(totalDay)} היום</span>` +
            `<span class="pill ${plIls>=0?'up':'down'}">${plIls>=0?'+':'-'}₪${fmt(plIls)} (${fmtP(plPct)})</span>`;

        // ── Tab 1: Holdings (simple rows) ──
        document.getElementById('stock-list').innerHTML = rows.map(r => {
            const cls = r.dayPct >= 0 ? 'up' : 'down';
            return `<div class="stock-row">
              <div>
                <div class="stock-name">${r.name}</div>
                <div class="stock-meta">${r.qty} יח׳ | קנייה ₪${r.avg.toLocaleString('he-IL',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
              </div>
              <div class="stock-right">
                <div class="stock-pct ${cls}">${fmtP(r.dayPct)}</div>
                <div class="stock-price">₪${r.cur.toLocaleString('he-IL',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
              </div>
            </div>`;
        }).join('');

        // ── Tab 2: Analysis (detail cards) ──
        document.getElementById('analysis-list').innerHTML = rows.map(r => {
            const plCls = r.totPct >= 0 ? 'up' : 'down';
            const dCls  = r.dayPct >= 0 ? 'up' : 'down';
            const dateStr = r.buyDate
                ? (r.buyDate.length > 10 ? new Date(r.buyDate).toLocaleDateString('he-IL') : r.buyDate)
                : '—';
            return `<div class="detail-card">
              <div class="dc-header">
                <span class="dc-name">${r.name}</span>
                <span class="stock-pct ${plCls}" style="font-size:0.9rem">${fmtP(r.totPct)}</span>
              </div>
              <div class="dc-grid">
                <div class="dc-item"><label>כמות</label><span>${r.qty} יח׳</span></div>
                <div class="dc-item"><label>שער קנייה</label><span>₪${r.avg.toLocaleString('he-IL',{maximumFractionDigits:2})}</span></div>
                <div class="dc-item"><label>שער נוכחי</label><span>₪${r.cur.toLocaleString('he-IL',{maximumFractionDigits:2})}</span></div>
                <div class="dc-item"><label>שינוי יומי</label><span class="${dCls}">${fmtP(r.dayPct)}</span></div>
                <div class="dc-item"><label>עלות</label><span>₪${fmt(r.cost)}</span></div>
                <div class="dc-item"><label>שווי</label><span>₪${fmt(r.cur * r.qty)}</span></div>
                <div class="dc-item"><label>רווח/הפסד ₪</label><span class="${plCls}">${r.totGain>=0?'+':'-'}₪${fmt(r.totGain)}</span></div>
                <div class="dc-item"><label>תאריך קנייה ראשון</label><span>${dateStr}</span></div>
              </div>
            </div>`;
        }).join('');

        // ── Tab 3: Transactions ──
        const recentTx = [...txHistory].reverse().slice(0, 50);
        document.getElementById('tx-list').innerHTML = recentTx.length
            ? recentTx.map(tx => {
                const isBuy = (tx.action === 'Buy' || tx.type === 'buy');
                const name  = tx.symbol ?? tx.name ?? '—';
                const dateStr = tx.date
                    ? new Date(tx.date).toLocaleDateString('he-IL')
                    : (tx.time ?? '');
                return `<div class="tx-row">
                  <div class="tx-left">
                    <div class="tx-name">${isBuy?'🟢':'🔴'} ${name}</div>
                    <div class="tx-meta">${dateStr}</div>
                  </div>
                  <div class="tx-right">
                    ${tx.qty} יח׳ × ₪${parseFloat(tx.price||0).toFixed(2)}
                  </div>
                </div>`;
            }).join('')
            : '<div class="msg system">אין עסקאות</div>';

        document.getElementById('status-bar').textContent =
            `עדכון: ${new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})}`;

    } catch(e) {
        document.getElementById('status-bar').textContent = 'שגיאה בטעינת נתונים';
    }
}

// ── Auto-resize textarea ──────────────────────────────────────────────────────
const ta = document.getElementById('question');
ta.addEventListener('input', () => { ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,120)+'px'; });
ta.addEventListener('keydown', e => { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendQuestion();} });

// ── Markdown renderer ─────────────────────────────────────────────────────────
function renderMarkdown(text) {
    let s = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    s = s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    s = s.replace(/__(.+?)__/g,'<strong>$1</strong>');
    s = s.replace(/\*([^*\n]+?)\*/g,'<em>$1</em>');
    s = s.replace(/^(\d+)\.\s+(.+)$/gm,'<div style="margin:.2em 0"><strong>$1.</strong> $2</div>');
    s = s.replace(/^[-•]\s+(.+)$/gm,'<div style="margin:.2em 0">• $1</div>');
    s = s.replace(/\n/g,'<br>');
    return s;
}

function addMsg(text, cls) {
    const div = document.createElement('div');
    div.className = `msg ${cls}`;
    if (cls === 'ai') div.innerHTML = renderMarkdown(text);
    else div.textContent = text;
    document.getElementById('messages').appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    if (cls === 'ai' && !document.getElementById('chat-drawer').classList.contains('open')) {
        _unread++;
        const badge = document.getElementById('chat-badge');
        badge.textContent = _unread;
        badge.style.display = 'flex';
    }
    return div;
}
function addTyping() {
    const div = document.createElement('div');
    div.className = 'msg ai typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    document.getElementById('messages').appendChild(div);
    div.scrollIntoView({ behavior:'smooth', block:'end' });
    return div;
}

// ── Send question ─────────────────────────────────────────────────────────────
let _history = [];
let busy = false;

async function sendQuestion() {
    const q = ta.value.trim();
    if (!q || busy) return;
    if (!SERVER) { openModal(); return; }

    // Historical guard
    if (/אתמול|שלשום|שבוע שעבר|חודש שעבר|לפני שבוע|לפני חודש|ביום שישי|ביום חמישי/.test(q)) {
        addMsg('אין לי גישה לנתונים היסטוריים — אני עובד עם מחירים חיים של היום בלבד.', 'ai');
        return;
    }

    busy = true;
    document.getElementById('send-btn').disabled = true;
    ta.value = ''; ta.style.height = 'auto';
    addMsg(q, 'user');
    _history.push({ role: 'user', content: q });
    const typing = addTyping();

    try {
        const res = await fetch(`${SERVER}/api/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: _history, mobile: true }),
            signal: AbortSignal.timeout(30_000),
        });
        typing.remove();
        if (!res.ok) { const e = await res.json().catch(()=>({})); addMsg(e.error||`שגיאה ${res.status}`,'error'); return; }
        const data = await res.json();
        const answer = data.reply ?? data.content ?? data.message ?? JSON.stringify(data);
        addMsg(answer, 'ai');
        _history.push({ role: 'assistant', content: answer });
        if (_history.length > 10) _history = _history.slice(-10);
    } catch(e) {
        typing.remove();
        addMsg(e.name==='TimeoutError' ? 'הבקשה לקחה יותר מדי זמן. נסה שוב.' : `שגיאת חיבור: ${e.message}`, 'error');
    } finally {
        busy = false;
        document.getElementById('send-btn').disabled = false;
    }
}

// ── Server modal ──────────────────────────────────────────────────────────────
function openModal() { document.getElementById('server-url').value=SERVER; document.getElementById('overlay').classList.remove('hidden'); }
function closeModal() { document.getElementById('overlay').classList.add('hidden'); }
function saveServer() {
    const url = document.getElementById('server-url').value.trim().replace(/\/$/,'');
    if (!url) return;
    SERVER = url; localStorage.setItem('bursa_server', SERVER); closeModal();
}

// ── Latest Scans ──────────────────────────────────────────────────────────────
async function showLatestScans() {
    if (!SERVER) { openModal(); return; }
    openChat();
    addMsg('🔍 מביא דוחות אחרונים...', 'system');
    try {
        const res  = await fetch(`${SERVER}/api/latest-scans`, { signal: AbortSignal.timeout(10_000) });
        const data = await res.json();
        const scans = data.scans ?? [];
        if (!scans.length) { addMsg('אין דוחות שנסרקו עדיין.','system'); return; }
        const recIcon = r => r==='קנייה'?'🟢':r==='מכירה'?'🔴':'🟡';
        const lines = scans.map(s => {
            const time = new Date(s.scannedAt).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
            const rec  = s.recommendation ? ` ${recIcon(s.recommendation)} ${s.recommendation}` : '';
            return `**${s.company}**${rec} — ${time}\n${s.summary??s.title??''}`;
        }).join('\n\n');
        addMsg(lines, 'ai');
    } catch(e) { addMsg(`שגיאה: ${e.message}`,'error'); }
}

// ── PDF Upload ────────────────────────────────────────────────────────────────
async function uploadPDF(input) {
    const file = input.files[0]; if (!file) return; input.value='';
    if (!SERVER) { openModal(); return; }
    openChat();
    addMsg(`📄 מנתח: ${file.name}`, 'system');
    const typing = addTyping();
    try {
        const form = new FormData(); form.append('file', file);
        const res = await fetch(`${SERVER}/api/analyze-report`, { method:'POST', body:form, signal:AbortSignal.timeout(60_000) });
        typing.remove();
        if (!res.ok) { const e=await res.json().catch(()=>({})); addMsg(e.error||`שגיאה ${res.status}`,'error'); return; }
        const data = await res.json();
        addMsg(_formatReport(data), 'ai');
    } catch(e) { typing.remove(); addMsg(e.name==='TimeoutError'?'הניתוח לקח יותר מדי זמן.':`שגיאה: ${e.message}`,'error'); }
}
function _formatReport(a) {
    if (!a||typeof a!=='object') return JSON.stringify(a);
    const rec=a.recommendation??'—'; const conf=a.confidence??0;
    const m=a.metrics??{};
    const metric=(l,v,s='')=>v!=null?`${l}: ${v}${s}`:null;
    const metrics=[
        metric('הכנסות',m.revenue!=null?Number(m.revenue).toLocaleString('he-IL'):null,' ₪'),
        metric('EBITDA',m.ebitda!=null?Number(m.ebitda).toLocaleString('he-IL'):null,' ₪'),
        metric('רווח נקי',m.netProfit!=null?Number(m.netProfit).toLocaleString('he-IL'):null,' ₪'),
        metric('EPS',m.eps),metric('P/E',m.peRatio),metric('ROE',m.roe,'%'),
    ].filter(Boolean).join(' | ');
    const swot=[
        a.swot?.strengths?.length?`💪 ${a.swot.strengths.join(', ')}`:null,
        a.swot?.weaknesses?.length?`⚠️ ${a.swot.weaknesses.join(', ')}`:null,
        a.swot?.opportunities?.length?`🚀 ${a.swot.opportunities.join(', ')}`:null,
        a.swot?.threats?.length?`🔴 ${a.swot.threats.join(', ')}`:null,
    ].filter(Boolean).join('\n');
    const icon=rec==='קנייה'?'🟢':rec==='מכירה'?'🔴':'🟡';
    return [`**${a.company??'—'}** ${a.period??''}`,`${icon} **${rec}** (ביטחון: ${conf}%)`,
        a.summary??'',metrics?`\n${metrics}`:'',swot?`\n${swot}`:'',
        a.fxImpact?.explanation?`\n💱 ${a.fxImpact.explanation}`:'',].filter(Boolean).join('\n');
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, { duration=3000, color='#1db954' }={}) {
    let el = document.getElementById('_app-toast');
    if (!el) {
        el = document.createElement('div'); el.id='_app-toast';
        el.style.cssText=[
            'position:fixed','top:calc(18px + env(safe-area-inset-top, 0px))','left:50%',
            '-webkit-transform:translateX(-50%) translateY(-80px)','transform:translateX(-50%) translateY(-80px)',
            'background:rgba(20,20,35,0.92)','color:#fff','padding:10px 22px','border-radius:32px',
            'font-size:14px','font-weight:600','white-space:nowrap','direction:rtl',
            'z-index:2147483647','pointer-events:none',
            'backdrop-filter:blur(12px)','-webkit-backdrop-filter:blur(12px)',
            'box-shadow:0 4px 24px rgba(0,0,0,.35)',
            '-webkit-transition:-webkit-transform .35s cubic-bezier(.34,1.56,.64,1)',
            'transition:transform .35s cubic-bezier(.34,1.56,.64,1)',
        ].join(';');
        document.documentElement.appendChild(el);
    }
    el.textContent=msg; el.style.borderBottom=`2px solid ${color}`;
    void el.offsetHeight;
    el.style.webkitTransform='translateX(-50%) translateY(0)';
    el.style.transform='translateX(-50%) translateY(0)';
    clearTimeout(el._t);
    el._t=setTimeout(()=>{ el.style.webkitTransform='translateX(-50%) translateY(-80px)'; el.style.transform='translateX(-50%) translateY(-80px)'; }, duration);
}

setTimeout(() => showToast(`${_g} — MyBursa מוכן`, { duration:4000, color:'#4f8ef7' }), 700);
</script>
